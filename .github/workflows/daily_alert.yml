name: Daily TEFAS Alert

on:
  schedule:
    # Her gün Türkiye saatiyle 10:30 (UTC 07:30)
    - cron: '30 7 * * *'
  workflow_dispatch: # Manuel tetikleme için

permissions:
  contents: write # Veritabanını geri push edebilmesi için gerekli

jobs:
  run-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Güncellendi (Node uyarısı için)

      - name: Set up Python
        uses: actions/setup-python@v5 # Güncellendi (Node uyarısı için)
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Alert Job
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          Z_SCORE_THRESHOLD: 2.5
          DAILY_RETURN_THRESHOLD: 5.0
          FUND_TYPE: YAT
        run: |
          python run_action.py

      - name: Commit and Push Database Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/tefas.db
          git commit -m "chore: update database [skip ci]" || echo "No changes to commit"
          git push
